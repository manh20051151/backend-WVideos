spring:
  application:
    name: backendWVideos
  
  # Database Configuration
  datasource:
    url: ${env.DB_URL:jdbc:mysql://localhost:3306/db_wvideos?createDatabaseIfNotExist=true}
    username: ${env.DB_USERNAME:root}
    password: ${env.DB_PASSWORD:sapassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
  
  # Multipart File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 2GB
      max-request-size: 2GB
      file-size-threshold: 10MB
  
  # Redis Configuration
  data:
    redis:
      host: ${env.REDIS_HOST:localhost}
      port: ${env.REDIS_PORT:6379}
      password: ${env.REDIS_PASSWORD:}
      database: ${env.REDIS_DATABASE:0}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 1014693057086-2qkmf1il6u8bddlmhsgfcmfnpjdmlpc8.apps.googleusercontent.com
            client-secret: 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
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - profile
            client-name: Google
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/oauth2/jwks
  

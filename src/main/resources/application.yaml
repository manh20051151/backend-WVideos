  frontend-url: ${env.FRONTEND_URL:http://localhost:3000}

# DoodStream Configuration
doodstream:
  api-key: ${env.DOODSTREAM_API_KEY:550224nz0x44aku5y80cv5}
  api-base-url: https://doodapi.co/api
  upload-server-endpoint: /upload/server
  file-info-endpoint: /file/info
  file-list-endpoint: /file/list

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    filter: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      authentication:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      introspect:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      refresh:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  
  ratelimiter:
    instances:
      authentication:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0s
      introspect:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0s
  
  retry:
    instances:
      authentication:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

# Logging Configuration
logging:
  level:
    com.example.backendWVideos: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.deprecation: ERROR
    org.springframework.boot.autoconfigure.thymeleaf: ERROR
    org.springframework.boot.autoconfigure.orm.jpa: WARN
    org.hibernate.engine.jdbc.env.internal.JdbcEnvironmentInitiator: ERROR
    org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl: ERROR
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]){magenta} %clr(%-5level){highlight} %clr(%logger{36}){cyan} %clr(-){faint} %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
